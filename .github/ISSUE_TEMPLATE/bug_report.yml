name: Bug Report
description: Report a reproducible problem in the app or domain logic.
title: "[Bug]: "
labels:
  - bug
  - status:needs-triage
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Market Time Machine. Please avoid posting secrets, brokerage credentials, private financial records, or restricted data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: List the smallest steps that reproduce the issue.
      placeholder: |
        1. Run `npm run dev`
        2. Select scenario ...
        3. Place order ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "macOS 15, Node 20.11, Chrome 124"
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: Screenshots, logs, or notes. Do not include sensitive data.
