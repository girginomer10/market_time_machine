name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Verify and package
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Run release checks
        run: npm run check

      - name: Read GitHub Pages configuration
        id: pages
        uses: actions/configure-pages@v6

      - name: Build for the configured Pages path
        env:
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: |
          if [ -n "$PAGES_BASE_PATH" ]; then
            BASE_PATH="$PAGES_BASE_PATH/"
          else
            BASE_PATH="/"
          fi
          npm run build -- --base "$BASE_PATH"
          npm run check:bundle-license
          npm run check:pwa

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v5
